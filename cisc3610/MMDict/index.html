<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> CISC3610 Portfolio </title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <button class="back-btn" style="vertical-align:middle" onclick="window.location.href='../'"><span>Back</span></button>
</head>

<body>

  <div class="main-background"></div>
  <div class="container">
    <div class="page-title text-center">Multimedia Dictionary</div>
    <div class="wordSelection">
      <div class="row justify-content-center">
        <div class="col-md-10">
          <div class="card bg-info text-black">
            <div class="card-body">
              <h4 class="card-title text-center">
                <select id="wordSelector" onchange="updateSelection()">
              </h4>
              <h6 class="card-body text-center">
                <option value="">-- Select a word --</option>
                <option
                  data-sentence="A feeling of self-assurance arising from one's appreciation of one's own abilities or qualities.">
                  Confidence</option>
                <option
                  data-sentence="A strong feeling of support or allegiance to a person, group, institution, or set of beliefs.">
                  Loyalty</option>
                <option data-sentence="The process of growing, progressing, or becoming more advanced and mature.">
                  Developing</option>
                <option data-sentence="A cherished aspiration, ambition, or ideal.">Dream</option>
                <option
                  data-sentence="The quality of being fair and reasonable; the administration of law or authority in maintaining this.">
                  Justice</option>
                </select>

                <br><textarea id="showSentence" class="form-control w-100"
                  style="height: 80px">Select a word to see the sentence</textarea><br>

                <button onclick="speakContents('word')">Speak word</button>
                <button onclick="speakContents('sentence')">Speak sentence</button>
              </h6>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>

</html>
