<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> CISC3610 Portfolio </title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <button class="back-btn" style="vertical-align:middle" onclick="window.location.href='../'"><span>Back</span></button>
</head>

<body>

  <div class="main-background"></div>
  <div class="container">
    <div class="page-title text-center">Multimedia Dictionary</div>
    <div class="wordSelection">
      <select id="wordSelector" onchange="updateSelection()">
        <option value="">-- Select a word --</option>
        <option data-sentence="sentence with word1">word1</option>
        <option data-sentence="sentence with word2">word2</option>
        <option data-sentence="sentence with word3">word3</option>
        <option data-sentence="sentence with word4">word4</option>
        <option data-sentence="sentence with word5">word5</option>
      </select>
      <button onclick="speakContents('word')">Speak</button>
    </div>

    <div class="sentenceDisplay">
      <br><textarea id="showSentence" readonly>Select a word to see the sentence</textarea>
      <button onclick="speakContents('sentence')">Speak</button>
    </div>

  </div>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>

</html>
