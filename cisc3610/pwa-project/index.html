<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="theme-color" content="#38022b">
	<link rel="manifest" href="manifest.json">
	<link rel="stylesheet" href="style.css">

	<title> Mythology PWA </title>
</head>

<body>
	<nav class="navbar">
		<button class="back-btn" onclick="window.location.href='../'"><span>Back</span></button>
		<h1 class="nav-title">Mythology PWA</h1>
	</nav>

	<header class="app-header">
		<select id="myth-selector">
			<option selected disabled>Select a Chapter...</option>
		</select>
	</header>

	<div class="wrapper">
		<div id="audio-controls">
			<button id="play-btn" disabled>▶️ Play</button>
			<button id="pause-btn" disabled>⏸️ Pause</button>
			<button id="stop-btn" disabled>⏹️ Stop</button>
		</div>

		<main id="myth-display" class="content-card">
			<div class="welcome-msg">
				<h2>Welcome</h2>
				<p>Please select a topic from the menu above to begin.</p>
			</div>
		</main>
	</div>

	<script src="app.js"></script>
</body>

</html>
